<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z Paste Web Viewer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 24px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .header {
            border-bottom: 1px solid #21262d;
            padding-bottom: 16px;
            margin-bottom: 20px;
        }
        h1 { margin: 0; font-size: 24px; color: #f0f6fc; }
        .meta { font-size: 14px; color: #8b949e; margin-top: 8px; }
        pre {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 16px;
            overflow: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 id="title">Loading Paste...</h1>
            <div id="meta" class="meta">Please wait...</div>
        </div>
        <pre><code id="code" class="plaintext"></code></pre>
    </div>

    <script>
        // আপনার আসল ফায়ারবেস প্রোজেক্ট ইনফরমেশন
        const firebaseConfig = {
            apiKey: "AIzaSyDTdnei-LCdZ9TOcmDiRNS5Foce_7e6glc",
            authDomain: "islamic-app-a21ef.firebaseapp.com",
            databaseURL: "https://islamic-app-a21ef-default-rtdb.firebaseio.com",
            projectId: "islamic-app-a21ef",
            storageBucket: "islamic-app-a21ef.firebasestorage.app",
            messagingSenderId: "752553545829",
            appId: "1:752553545829:android:044cc2ffbd2d7499ec368c"
        };
        firebase.initializeApp(firebaseConfig);

        const pathParts = window.location.pathname.split('/');
        const pasteId = pathParts[pathParts.length - 1];

        if (pasteId) {
            firebase.database().ref('pastes/' + pasteId).once('value').then((snapshot) => {
                if (snapshot.exists()) {
                    const paste = snapshot.val();
                    
                    if(paste.visibility === "PRIVATE" || (paste.expireTime && paste.expireTime < Date.now())) {
                        document.getElementById('title').innerText = "Unavailable";
                        document.getElementById('meta').innerText = "This content has expired or is restricted.";
                        return;
                    }

                    document.getElementById('title').innerText = paste.title || "Untitled Paste";
                    document.getElementById('meta').innerText = `Posted by ${paste.authorName || 'Guest'} | Language: ${paste.language || 'Plain Text'}`;
                    
                    const codeBlock = document.getElementById('code');
                    codeBlock.innerText = paste.code;
                    codeBlock.className = paste.language || 'plaintext';

                    import('https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/es/highlight.min.js').then((module) => {
                        module.default.highlightAll();
                    });

                    firebase.database().ref('pastes/' + pasteId + '/views').transaction((currentViews) => {
                        return (currentViews || 0) + 1;
                    });
                } else {
                    document.getElementById('title').innerText = "404 Not Found";
                    document.getElementById('meta').innerText = "The specified paste could not be loaded.";
                }
            });
        }
    </script>
</body>
</html>
